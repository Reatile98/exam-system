<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>M.App Enterprise Assessment</title>

<style>
body { font-family: Arial; padding: 20px; background:#f5f5f5; }

h2 { text-align: center; }

#timer {
    text-align:center;
    font-size:20px;
    font-weight:bold;
    color:red;
    margin-bottom:20px;
}

.question {
    margin-bottom: 20px;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background:white;
}

.option { display: block; margin: 5px 0; }

.correct { background:#4CAF50; color:white; }
.wrong { background:#f44336; color:white; }

#resultBox {
    margin-top: 30px;
    padding: 15px;
    border: 2px solid black;
    display: none;
    background:white;
}

button {
    padding: 12px;
    font-size: 16px;
    width:100%;
}
</style>
</head>

<body>

<h2>M.App Enterprise Enumeration Assessment</h2>

<div id="timer">Time Left: 30:00</div>

<label>Full Name:</label><br>
<input type="text" id="name" style="width:100%; padding:8px;"><br><br>

<form id="quizForm"></form>

<button id="submitBtn" onclick="submitTest()">SUBMIT EXAM</button>

<div id="resultBox">
<h3>Results</h3>
<p id="scoreText"></p>
<p id="percentText"></p>
</div>

<script>

// TIMER
let time = 30 * 60;
let timer = setInterval(() => {
    let m = Math.floor(time / 60);
    let s = time % 60;
    document.getElementById("timer").innerText = `Time Left: ${m}:${s < 10 ? "0" + s : s}`;
    time--;
    if (time < 0) {
        clearInterval(timer);
        alert("Time is up!");
        submitTest();
    }
}, 1000);

// MASTER QUESTION BANK (without shuffled options yet)
const rawQuestions = [

// 1
{q:"You enter an EA and the map loads but shows no structure points. What is the MOST likely cause?",
o:["The EA has no dwelling units","You logged into the wrong EA","GPS is turned off","The tablet is out of battery"],a:1},

// 2
{q:"What does it mean if a structure point remains 'Untouched' after you have visited the location?",
o:["The dwelling was vacant","You did not save any changes to the point","The respondent refused to answer","You forgot to sync"],a:1},

// 3
{q:"A structure point is marked 'In Progress.' Which of the following is TRUE?",
o:["The questionnaire is fully completed and synced","At least one household questionnaire has been started but not finalized","The point has been marked for deletion","The enumerator has not yet visited the point"],a:1},

// 4
{q:"You are 60 meters away from a Dwelling Unit structure point. What happens when you try to save changes?",
o:["The app saves normally","The app blocks saving unless you enter a distance comment","The app automatically deletes the point","The app requires supervisor login"],a:1},

// 5
{q:"What is the primary purpose of the blue bars seen next to some entries in the point lists?",
o:["The point is locked by the supervisor","The point has unsynced changes","The point is a duplicate","The point has no GPS signal"],a:1},

// 6
{q:"Which statement about synchronization is FALSE?",
o:["Syncing uploads new data to the server","Syncing downloads updates from the server","Syncing can only be done at the end of the day","Syncing requires an internet connection"],a:2},

// 7
{q:"A household questionnaire status shows 'About to Start Questionnaire.' What does this indicate?",
o:["The questionnaire has been fully completed","The enumerator launched CSPro but did not complete the questionnaire","The household refused to participate","The questionnaire was deleted"],a:1},

// 8
{q:"What happens if you close Google Maps after navigating to a point?",
o:["You are logged out of M.App Enterprise","You return to M.App Enterprise with the point selected","The point is automatically marked as Completed","All unsynced data is lost"],a:1},

// 9
{q:"You are working offline. You open a structure point and complete a household questionnaire. Where is the data stored?",
o:["Only on the server","Locally on the tablet only","On both tablet and server immediately","Nowhere — offline data cannot be saved"],a:1},

// 10
{q:"What is the minimum distance restriction for an Institution structure point?",
o:["20 meters","50 meters","100 meters","No restriction"],a:2},

// 11
{q:"Which of the following can an enumerator do WITHOUT supervisor approval?",
o:["Unlock a distance restriction for a household","Mark a structure point as 'Marked for Deletion'","Approve a deleted structure point","Change the EA boundary"],a:1},

// 12
{q:"What does a 'Completed' status for a structure point mean?",
o:["All households in that structure have finalized questionnaires","The enumerator visited the point once","The point has been deleted from the EA","The supervisor has reviewed the point"],a:0},

// 13 True/False
{q:"If you log out without syncing, all unsynced data is automatically saved on the server.",
o:["True","False"],a:1},

// 14
{q:"The EA boundary is automatically downloaded every time you log in, even if you have worked offline before.",
o:["True","False"],a:1},

// 15
{q:"A structure point can have multiple households, but each household requires a separate questionnaire.",
o:["True","False"],a:0},

// 16
{q:"The Help menu contains descriptions of all icons used in the M.App Enterprise enumeration app.",
o:["True","False"],a:0},

// 17
{q:"If a structure point is marked 'Completed,' the enumerator can still reopen and edit it later.",
o:["True","False"],a:0},

// 18
{q:"You can launch a CSPro questionnaire directly from the CSPro app without opening M.App Enterprise first.",
o:["True","False"],a:1},

// 19
{q:"The 'Zeros under the up arrow' rule means there are no pending items to be synchronized.",
o:["True","False"],a:0},

// 20
{q:"An enumerator can see Unlock Approved Points in their menu after the supervisor approves the request.",
o:["True","False"],a:0},

// 21
{q:"If a structure point is missing from the map, the enumerator should ignore it and move to the next point.",
o:["True","False"],a:1},

// 22
{q:"A partial save is only possible when the tablet is online.",
o:["True","False"],a:1},

// 23
{q:"You have 50 untouched points and 10 in-progress points. You lose internet connection. Which statement is TRUE?",
o:["You cannot continue working until internet is restored","You can continue working on in-progress and untouched points, but data is stored locally","All in-progress points are automatically marked as completed","The app will delete all untouched points"],a:1},

// 24
{q:"A supervisor approves an unlock request for a household. What must the enumerator do next?",
o:["Immediately edit the household without syncing","Sync data to receive the approval, then open the household","Mark the household as deleted","Log out and log back in without syncing"],a:1},

// 25
{q:"Which of the following does NOT appear in the Untouched Points List screen?",
o:["Point Name","Feature Category","Special Type","Supervisor's comments"],a:3},

// 26
{q:"You are in a remote area with no internet. You downloaded imagery and vector data for two EAs before leaving. What happens when you log into the second EA?",
o:["You must delete the first EA's data before loading the second","Both EAs' points appear in the map and lists","The app crashes","Only the second EA's boundary is shown, but points from both EAs are visible"],a:3},

// 27
{q:"What does a 'Distance Comment' allow an enumerator to do?",
o:["Permanently disable distance restrictions for all points","Temporarily save a structure point outside the allowed distance","Change the GPS location of the point","Delete the point without supervisor approval"],a:1},

// 28
{q:"Which icon indicates that the tablet is in offline mode?",
o:["Green checkmark","Offline icon next to the username in the side menu","Red exclamation mark on the map","Blue bar next to points"],a:1},

// 29
{q:"If you sync and see a number greater than zero under the down arrow, what does that mean?",
o:["Data failed to sync","New data was received from the server","The tablet is out of storage","The EA boundary is corrupted"],a:1},

// 30
{q:"A structure point has a Feature Category of 'Dwelling Unit' and Structure Status of 'Vacant.' Should the enumerator launch a household questionnaire?",
o:["Yes, always","No, because there is no household to interview","Yes, but only for institutions","No, unless the supervisor approves"],a:1}

];

// Helper function to shuffle array
function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// Randomize options for a single question and track new correct index
function randomizeOptions(question) {
    let options = [...question.o];
    let correctValue = options[question.a];
    
    // Shuffle options
    let shuffled = shuffleArray([...options]);
    
    // Find new index of correct answer
    let newCorrectIndex = shuffled.indexOf(correctValue);
    
    return {
        q: question.q,
        o: shuffled,
        a: newCorrectIndex
    };
}

// Randomize all questions and their options
function getRandomizedQuestions() {
    let shuffledQuestions = shuffleArray([...rawQuestions]);
    return shuffledQuestions.map(q => randomizeOptions(q));
}

// Build UI with randomized questions
const randomizedQuestions = getRandomizedQuestions();
const form = document.getElementById("quizForm");

randomizedQuestions.forEach((q, i) => {
    let div = document.createElement("div");
    div.className = "question";

    let html = `<b>${i+1}. ${q.q}</b><br>`;

    q.o.forEach((opt, j) => {
        html += `<label class="option">
        <input type="radio" name="q${i}" value="${j}">
        ${opt}</label>`;
    });

    div.innerHTML = html;
    form.appendChild(div);
});

// Store randomized questions globally for grading
window.randomizedQuestions = randomizedQuestions;

// SUBMIT FUNCTION
function submitTest() {

    let name = document.getElementById("name").value.trim().toLowerCase();
    if (name === "") { alert("Enter your full name"); return; }

    let users = JSON.parse(localStorage.getItem("exam_users") || "{}");
    if (users[name]) { alert("You have already taken this exam."); return; }

    let score = 0;

    window.randomizedQuestions.forEach((q, i) => {
        let selected = document.querySelector(`input[name="q${i}"]:checked`);
        let options = document.getElementsByName(`q${i}`);

        options.forEach((opt, j) => {
            let label = opt.parentElement;
            if (j === q.a) { label.classList.add("correct"); }
            if (opt.checked && j !== q.a) { label.classList.add("wrong"); }
        });

        if (selected && parseInt(selected.value) === q.a) {
            score++;
        }
    });

    let percent = Math.round((score / 30) * 100);

    document.getElementById("resultBox").style.display = "block";
    document.getElementById("scoreText").innerHTML = `Score: ${score} / 30`;
    document.getElementById("percentText").innerHTML = `Percentage: ${percent}%`;

    users[name] = true;
    localStorage.setItem("exam_users", JSON.stringify(users));

    document.getElementById("submitBtn").disabled = true;
    clearInterval(timer);
}

</script>
</body>
</html>
